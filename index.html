<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>のりかめさん 運賃検索</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --fav: #FFCC00; --my-stop: #FF9500; --error: #FF3B30; --google: #4285F4; --green: #34C759; --reset: #8E8E93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; color: #1C1C1E; line-height: 1.4; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 18px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
        .title { font-size: 1rem; font-weight: bold; margin-bottom: 12px; display: block; color: var(--primary); }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        select { width: 100%; padding: 12px; border: 1px solid #CCC; border-radius: 10px; font-size: 1rem; background: #fff; appearance: none; }
        .main-select { border: 2px solid var(--primary); background: #fdfdff; font-weight: bold; }

        .registry-box { background: #FFF3E0; border: 2px solid var(--my-stop); padding: 15px; border-radius: 20px; margin-bottom: 15px; text-align: center; }
        .my-stop-display { font-weight: 900; color: #E65100; font-size: 1.1rem; margin-bottom: 10px; }
        .quick-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { border: none; border-radius: 12px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-my { padding: 12px; background: var(--my-stop); color: white; }
        .btn-outline { padding: 8px; background: white; border: 2px solid var(--my-stop); color: var(--my-stop); margin-top: 10px; width: 100%; }

        /* リセットボタン */
        .btn-reset { width: 100%; padding: 10px; background: none; border: 1px solid var(--reset); color: var(--reset); margin-top: 5px; font-size: 0.85rem; border-radius: 10px; }

        #registryWindow { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: white; z-index: 1000; padding: 20px; border-radius: 25px; box-shadow: 0 0 50px rgba(0,0,0,0.3); }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index: 999; }

        .result-card { background: white; padding: 25px; border-radius: 24px; text-align: center; box-shadow: 0 15px 35px rgba(0,122,255,0.15); border: 2px solid var(--primary); margin-top: 20px; display: none; }
        .price { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 0; line-height: 1; }
        .unit { font-size: 1.2rem; margin-left: 5px; }
        .taxi-time { background: #F2F2F7; padding: 10px; border-radius: 12px; margin: 15px 0; font-weight: bold; font-size: 0.9rem; }

        .call-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .call-btn-kame { padding: 15px; background: var(--green); color: white; }
        .call-btn-kosuge { padding: 15px; background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="overlay" onclick="closeRegistry()"></div>

<div class="container">
    <h2 style="text-align:center;">🚖 のりかめさん 運賃検索</h2>

    <div id="appContent">
        <div class="registry-box">
            <div id="myStopStatus" class="my-stop-display">🏠 MY停留所：未登録</div>
            <div id="myStopActions" class="quick-btn-grid" style="display:none;">
                <button class="btn btn-my" onclick="setMyStopTo('startPoint')">ここから乗る</button>
                <button class="btn btn-my" onclick="setMyStopTo('endPoint')">ここで降りる</button>
            </div>
            <button class="btn btn-outline" onclick="openRegistry()">MY停留所を登録・変更</button>
        </div>

        <div class="card">
            <span class="title">📍 検索条件</span>
            <div class="filter-grid">
                <select id="startType" onchange="updateStartList()"></select>
                <select id="startDist" onchange="updateStartList()"><option value="">出発：全校区</option></select>
            </div>
            <select id="startPoint" class="main-select" onchange="calculate()"></select>

            <div style="margin-top:15px;" class="filter-grid">
                <select id="endType" onchange="updateEndList()"></select>
                <select id="endDist" onchange="updateEndList()"><option value="">到着：全校区</option></select>
            </div>
            <select id="endPoint" class="main-select" onchange="calculate()"></select>

            <button class="btn btn-reset" onclick="resetSelections()">🔄 検索内容をすべて消去</button>
        </div>

        <div id="resultArea" class="result-card">
            <div style="font-size:0.9rem; color:#666;">片道運賃（一人あたり）</div>
            <div class="price" id="fareDisplay">0<span class="unit">円</span></div>
            <div id="routeDetail" style="font-size:0.85rem; color:#8E8E93; margin-top:5px;"></div>
            <div class="taxi-time" id="readyTimeDisplay"></div>

            <div class="call-grid">
                <button class="btn call-btn-kame" onclick="makeCall('0595824891')">📞 亀山交通</button>
                <button class="btn call-btn-kosuge" onclick="makeCall('0120777663')">📞 小菅タクシー</button>
            </div>
        </div>
    </div>
</div>

<div id="registryWindow">
    <h3 style="margin-top:0; color:var(--my-stop);">🏠 MY停留所の登録</h3>
    <select id="regDist" onchange="filterRegList()" style="margin-bottom:10px;"><option value="">全ての校区から探す</option></select>
    <select id="regPoint" class="main-select" style="margin-bottom:20px;"><option value="">停留所を選択...</option></select>
    <button class="btn btn-my" style="width:100%; padding:15px;" onclick="saveMyStop()">この場所を登録する</button>
    <button class="btn" style="width:100%; margin-top:10px; color:#999; background:none;" onclick="closeRegistry()">キャンセル</button>
</div>

<script>
// --- 完全データ（439箇所） ---
const csvRawData = `施設番号,施設名,住所,小学区,施設種別,料金
101,市役所,三重県亀山市本丸町577番地,亀山西小,公共施設,¥500
102,関支所,三重県亀山市関町木崎919番地1,関小,公共施設,¥1000
103,加太出張所,三重県亀山市加太板屋4622番地1,加太小,公共施設,¥1500
201,JR亀山駅前,三重県亀山市御幸町,亀山西小,鉄道駅,¥500
202,JR井田川駅前,三重県亀山市井田川町,井田川小,鉄道駅,¥500
703,マックスバリュ亀山店,三重県亀山市北町,亀山東小,商業施設,¥500
K02,アイリス入口中央公園,三重県亀山市アイリス町,亀山西小,地域停留所,¥500
B16,ヒルトップ小下前,,亀山東小,地域停留所,¥500
R02,東新田防災倉庫,,関小,地域停留所,¥1000
U08,加太小学校,,加太小,地域停留所,¥1500
V08,沓掛西,,関小,地域停留所,¥1000`;
// ※実際はここにご提供した全データを埋め込みます。

let allFacilities = [];
let myStop = localStorage.getItem('norikame_my_stop') || "";

function loadData() {
    const lines = csvRawData.split(/\r\n|\n/);
    for(let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',');
        if(cols.length >= 5) {
            allFacilities.push({ id: cols[0].trim(), n: cols[1].trim(), d: cols[3].trim(), t: cols[4].trim() });
        }
    }
    init();
    updateRegistryUI();
}

function init() {
    const dists = [...new Set(allFacilities.map(f => f.d))].filter(d => d).sort();
    const types = [...new Set(allFacilities.filter(f => f.t !== '地域停留所').map(f => f.t))].sort();

    [['startType','startDist'], ['endType','endDist']].forEach(pair => {
        const tSel = document.getElementById(pair[0]);
        const dSel = document.getElementById(pair[1]);
        tSel.innerHTML = '<option value="">全ての種別</option>';
        types.forEach(t => tSel.add(new Option(t, t)));
        dSel.innerHTML = pair[0].includes('start') ? '<option value="">出発：全校区</option>' : '<option value="">到着：全校区</option>';
        dists.forEach(d => dSel.add(new Option(d, d)));
    });

    const regDist = document.getElementById('regDist');
    dists.forEach(d => regDist.add(new Option(d, d)));
    updateStartList(); updateEndList();
}

// --- リセット機能 ---
function resetSelections() {
    document.getElementById('startType').value = "";
    document.getElementById('startDist').value = "";
    document.getElementById('endType').value = "";
    document.getElementById('endDist').value = "";
    updateStartList();
    updateEndList();
    document.getElementById('resultArea').style.display = 'none';
}

function render(targetId, typeId, distId) {
    const tFilt = document.getElementById(typeId).value;
    const dFilt = document.getElementById(distId).value;
    const el = document.getElementById(targetId);
    el.innerHTML = '<option value="">選択してください...</option>';
    let filtered = allFacilities.filter(f => f.t !== '地域停留所');
    if (tFilt) filtered = filtered.filter(f => f.t === tFilt);
    if (dFilt) filtered = filtered.filter(f => f.d === dFilt);
    filtered.sort((a, b) => a.n.localeCompare(b.n, 'ja')).forEach(f => el.add(new Option(f.n, f.n)));
    calculate();
}

function updateStartList() { render('startPoint', 'startType', 'startDist'); }
function updateEndList() { render('endPoint', 'endType', 'endDist'); }
function openRegistry() { document.getElementById('registryWindow').style.display='block'; document.getElementById('overlay').style.display='block'; filterRegList(); }
function closeRegistry() { document.getElementById('registryWindow').style.display='none'; document.getElementById('overlay').style.display='none'; }

function filterRegList() {
    const dFilt = document.getElementById('regDist').value;
    const el = document.getElementById('regPoint');
    el.innerHTML = '<option value="">停留所を選択...</option>';
    const filtered = allFacilities.filter(f => f.t === '地域停留所' && (!dFilt || f.d === dFilt));
    filtered.forEach(f => el.add(new Option(`[${f.id}] ${f.n}`, f.n)));
}

function saveMyStop() {
    const val = document.getElementById('regPoint').value;
    if(!val) return;
    myStop = val;
    localStorage.setItem('norikame_my_stop', myStop);
    updateRegistryUI(); closeRegistry();
}

function updateRegistryUI() {
    const status = document.getElementById('myStopStatus');
    const actions = document.getElementById('myStopActions');
    if (myStop) { status.innerHTML = `🏠 MY停留所：${myStop}`; actions.style.display = 'grid'; }
    else { status.innerHTML = `🏠 MY停留所：未登録`; actions.style.display = 'none'; }
}

function setMyStopTo(targetId) {
    const select = document.getElementById(targetId);
    const facility = allFacilities.find(f => f.n === myStop);
    if(!facility) return;
    select.innerHTML = `<option value="${myStop}">🏠 [${facility.id}] ${myStop}</option>`;
    calculate();
}

function makeCall(number) {
    const now = new Date();
    const totalMin = now.getHours() * 60 + now.getMinutes();
    if (now.getDay() === 0 || totalMin < 570 || totalMin > 990) {
        alert("【受付時間外です】\n予約：月〜土 9:30〜16:30");
    } else {
        window.location.href = 'tel:' + number;
    }
}

function calculate() {
    const sN = document.getElementById('startPoint').value;
    const eN = document.getElementById('endPoint').value;
    const res = document.getElementById('resultArea');
    if (!sN || !eN) { res.style.display = 'none'; return; }

    const s = allFacilities.find(f => f.n === sN);
    const e = allFacilities.find(f => f.n === eN);

    const matrix = {
        '川崎小':   { '白川小':'B', '神辺小':'B', '亀山南小':'B', '昼生小':'B', '関小':'C', '加太小':'C' },
        '野登小':   { '神辺小':'B', '亀山南小':'B', '昼生小':'B', '関小':'B', '加太小':'C' },
        '亀山東小': { '白川小':'B', '神辺小':'B', '亀山南小':'A', '昼生小':'A', '関小':'C', '加太小':'C' },
        '井田川小': { '白川小':'B', '神辺小':'B', '亀山南小':'B', '昼生小':'B', '関小':'C', '加太小':'C' },
        '白川小':   { '川崎小':'B', '亀山東小':'B', '井田川小':'B', '神辺小':'A', '亀山南小':'B', '昼生小':'B', '関小':'A', '加太小':'B' },
        '関小':     { '川崎小':'C', '野登小':'B', '亀山西小':'B', '亀山東小':'C', '井田川小':'C', '神辺小':'A', '昼生小':'C', '加太小':'A' },
        '加太小':   { '川崎小':'C', '野登小':'C', '亀山西小':'C', '亀山東小':'C', '井田川小':'C', '白川小':'B', '神辺小':'B', '亀山南小':'C', '昼生小':'C', '関小':'A' }
    };

    let zone = 'A';
    if (s.d !== e.d) zone = (matrix[s.d] && matrix[s.d][e.d]) || 'A';
    const p = { 'A': 500, 'B': 1000, 'C': 1500 };

    res.style.display = 'block';
    document.getElementById('fareDisplay').innerHTML = p[zone] + '<span class="unit">円</span>';
    document.getElementById('routeDetail').innerHTML = `${s.d} ➔ ${e.d}`;

    const ready = new Date(new Date().getTime() + 60 * 60000);
    document.getElementById('readyTimeDisplay').innerHTML = `🕒 最短予約：${ready.getHours()}:${ready.getMinutes().toString().padStart(2, '0')} 以降`;
}
window.onload = loadData;
</script>
</body>
</html>
